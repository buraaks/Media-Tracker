name: Build & Deploy Nuxt (FTP)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Bağımlılıkları kur
        run: pnpm install --frozen-lockfile

      - name: API config olustur
        run: |
          {
            echo '<?php'
            echo 'if (basename($_SERVER["SCRIPT_FILENAME"]) === basename(__FILE__)) {'
            echo '    http_response_code(403);'
            echo '    exit;'
            echo '}'
            echo "define('DB_HOST', '${{ secrets.DB_HOST }}');"
            echo "define('DB_NAME', '${{ secrets.DB_NAME }}');"
            echo "define('DB_USER', '${{ secrets.DB_USER }}');"
            echo "define('DB_PASS', '${{ secrets.DB_PASS }}');"
            echo "define('JWT_SECRET', '${{ secrets.JWT_SECRET }}');"
          } > public/api/config.php

      - name: Nuxt static generate
        run: pnpm generate
        env:
          NUXT_PUBLIC_OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: .output/public/
          server-dir: ${{ secrets.FTP_PATH }}
          log-level: minimal
          dangerous-clean-slate: true
          timeout: 60000
